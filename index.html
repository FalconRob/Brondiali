<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pronostici Mondiali (Centralizzato)</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --border-color: #ccd0d5;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 {
            text-align: center;
            margin-top: 0;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        .main-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #f8f9fa;
        }

        .bracket {
            display: flex;
            gap: 40px;
            padding: 20px 0;
            min-width: 1200px;
        }
        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            flex-gap: 20px;
            flex: 1;
        }
        .round-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            background: #e9ecef;
            padding: 8px;
            border-radius: 4px;
        }
        .matchup {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        .admin-mode .team-row {
            cursor: pointer;
        }
        .admin-mode .team-row:hover {
            background-color: #e2e6ea;
        }
        .team-row.winner {
            background-color: #d4edda !important;
            color: #155724;
            font-weight: bold;
        }
        .team-row.eliminated {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .predictions-indicator {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 4px;
            border-top: 1px dashed #dee2e6;
            padding-top: 4px;
        }

        .admin-section {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }
        select, input[type="password"] {
            width: 100%;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }
        .hidden {
            display: none;
        }
        .badge-admin {
            background: #f39c12;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>🏆 Pronostici Mondiali tra Amici 🏆</h1>

    <div class="container">
        <div class="main-panel">
            <h2>Tabellone Fasi Finali</h2>
            <div class="bracket" id="bracket"></div>
        </div>

        <div class="side-panel">
            <!-- Accesso Admin -->
            <div class="card admin-section">
                <h3>Area Amministratore</h3>
                <div id="login-form">
                    <input type="password" id="admin-token" placeholder="Inserisci il Token GitHub">
                    <button class="btn" onclick="loginAdmin()">Attiva Modifica</button>
                </div>
                <div id="admin-logged" class="hidden">
                    <span class="badge-admin">Modalità Admin Attiva</span>
                    <button class="btn" style="background:#d35400" onclick="pushStateToGitHub()">Salva modifiche su GitHub</button>
                </div>
            </div>

            <!-- Classifica -->
            <div class="card">
                <h2>Classifica Generale</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Giocatore</th>
                            <th>Punti</th>
                            <th>Lungimiranza (potenziale)</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>

            <!-- Preferite -->
            <div class="card">
                <h3>Favorite Elette (Turno Corrente)</h3>
                <div id="current-favorites"></div>
            </div>

            <!-- Configurazione Turno -->
            <div class="card admin-section hidden" id="admin-panel">
                <h3>Gestione Pronostici Turno Successivo</h3>
                <div id="next-round-form" class="hidden">
                    <div id="form-fields"></div>
                    <button class="btn" onclick="saveNextRoundPredictions()">Sblocca e passa al prossimo turno</button>
                </div>
                <div id="round-status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE REPOSITORY GITHUB
        const GH_USER = 'FalconRob'; 
        const GH_REPO = 'Brondiali';
        const GH_FILE = 'dati.json';

        const PLAYERS = ['Roberto', 'Alessio', 'Emiliano', 'Fabio'];
        const ROUND_NAMES = ['Sedicesimi', 'Ottavi', 'Quarti', 'Semifinali', 'Finale', 'Campione'];
        const LUNGIMIRANZA_BONUS = [10, 7, 5, 3, 0];

        let GITHUB_TOKEN = '';
        let FILE_SHA = ''; 

        const INITIAL_MATCHUPS = [
            { t1: 'Germania', t2: 'Paraguay' }, { t1: 'Francia', t2: 'Svezia' },
            { t1: 'SudAfrica', t2: 'Canada' }, { t1: 'Olanda', t2: 'Marocco' },
            { t1: 'Portogallo', t2: 'Croazia' }, { t1: 'Spagna', t2: 'Austria' },
            { t1: 'USA', t2: 'Bosnia-Erzegovina' }, { t1: 'Belgio', t2: 'Senegal' },
            { t1: 'Brasile', t2: 'Giappone' }, { t1: 'Costa d\'Avorio', t2: 'Norvegia' },
            { t1: 'Messico', t2: 'Ecuador' }, { t1: 'Inghilterra', t2: 'Repubblica Democratica del Congo' },
            { t1: 'Argentina', t2: 'Capo Verde' }, { t1: 'Australia', t2: 'Egitto' },
            { t1: 'Svizzera', t2: 'Algeria' }, { t1: 'Colombia', t2: 'Ghana' }
        ];

        const INITIAL_PREDICTIONS = {
            0: [
                { Roberto: 'Germania', Alessio: 'Paraguay', Emiliano: 'Germania', Fabio: 'Germania' },
                { Roberto: 'Francia', Alessio: 'Francia', Emiliano: 'Francia', Fabio: 'Francia' },
                { Roberto: 'Canada', Alessio: 'Canada', Emiliano: 'Canada', Fabio: 'Canada' },
                { Roberto: 'Olanda', Alessio: 'Marocco', Emiliano: 'Marocco', Fabio: 'Olanda' },
                { Roberto: 'Croazia', Alessio: 'Portogallo', Emiliano: 'Croazia', Fabio: 'Portogallo' },
                { Roberto: 'Spagna', Alessio: 'Spagna', Emiliano: 'Spagna', Fabio: 'Spagna' },
                { Roberto: 'Bosnia-Erzegovina', Alessio: 'Bosnia-Erzegovina', Emiliano: 'USA', Fabio: 'USA' },
                { Roberto: 'Senegal', Alessio: 'Belgio', Emiliano: 'Belgio', Fabio: 'Belgio' },
                { Roberto: 'Brasile', Alessio: 'Brasile', Emiliano: 'Brasile', Fabio: 'Brasile' },
                { Roberto: 'Norvegia', Alessio: 'Norvegia', Emiliano: 'Costa d\'Avorio', Fabio: 'Norvegia' },
                { Roberto: 'Messico', Alessio: 'Messico', Emiliano: 'Messico', Fabio: 'Ecuador' },
                { Roberto: 'Inghilterra', Alessio: 'Repubblica Democratica del Congo', Emiliano: 'Inghilterra', Fabio: 'Inghilterra' },
                { Roberto: 'Argentina', Alessio: 'Capo Verde', Emiliano: 'Capo Verde', Fabio: 'Argentina' },
                { Roberto: 'Egitto', Alessio: 'Egitto', Emiliano: 'Egitto', Fabio: 'Australia' },
                { Roberto: 'Svizzera', Alessio: 'Svizzera', Emiliano: 'Algeria', Fabio: 'Svizzera' },
                { Roberto: 'Ghana', Alessio: 'Colombia', Emiliano: 'Ghana', Fabio: 'Colombia' }
            ]
        };

        const INITIAL_FAVORITES = {
            0: { Roberto: 'Spagna', Alessio: 'Marocco', Emiliano: 'Francia', Fabio: 'Argentina' }
        };

        let state = {
            currentRoundIndex: 0,
            rounds: [
                { name: 'Sedicesimi', matches: INITIAL_MATCHUPS.map(m => ({ ...m, winner: null })) },
                { name: 'Ottavi', matches: Array(8).fill(null).map(() => ({ t1: null, t2: null, winner: null })) },
                { name: 'Quarti', matches: Array(4).fill(null).map(() => ({ t1: null, t2: null, winner: null })) },
                { name: 'Semifinali', matches: Array(2).fill(null).map(() => ({ t1: null, t2: null, winner: null })) },
                { name: 'Finale', matches: Array(1).fill(null).map(() => ({ t1: null, t2: null, winner: null })) },
                { name: 'Campione', winner: null }
            ],
            predictions: INITIAL_PREDICTIONS,
            favorites: INITIAL_FAVORITES
        };

        // Scarica lo stato globale centralizzato da GitHub
        async function fetchStateFromGitHub() {
            try {
                // Il timestamp evita la cache del browser forzando lo scaricamento dei dati in tempo reale
                const response = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}?t=${new Date().getTime()}`);
                if (response.ok) {
                    const data = await response.json();
                    FILE_SHA = data.sha; 
                    const content = decodeURIComponent(escape(atob(data.content)));
                    const parsed = JSON.parse(content);
                    
                    // Se il file remoto non è vuoto, sovrascrivi lo stato locale
                    if (parsed && parsed.rounds) {
                        state = parsed;
                    }
                }
            } catch (e) {
                console.error("Impossibile leggere i dati da GitHub, uso i dati di default.", e);
            }
            propagateTorneo();
            renderBracket();
            renderSidebar();
        }

        // Invia lo stato aggiornato a GitHub (solo per l'admin)
        async function pushStateToGitHub() {
            if (!GITHUB_TOKEN) return alert("Inserisci prima il token!");
            
            // Prima di salvare rifacciamo il fetch per aggiornare il FILE_SHA corrente ed evitare conflitti di sovrascrittura
            await fetchStateFromGitHub();

            const contentStr = JSON.stringify(state, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(contentStr)));

            try {
                const response = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Aggiornamento tabellone e punteggi mondiali",
                        content: base64Content,
                        sha: FILE_SHA
                    })
                });

                if (response.ok) {
                    alert("Salvataggio su GitHub completato con successo! I tuoi amici vedranno gli aggiornamenti entro un paio di minuti.");
                    fetchStateFromGitHub();
                } else {
                    const errData = await response.json();
                    alert("Errore durante il salvataggio: " + errData.message);
                }
            } catch (e) {
                alert("Errore di rete: " + e.message);
            }
        }

        function loginAdmin() {
            const token = document.getElementById('admin-token').value.trim();
            if (token) {
                GITHUB_TOKEN = token;
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('admin-logged').classList.remove('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.body.classList.add('admin-mode');
                renderBracket();
                checkRoundCompletion();
            }
        }

        function calculateScores() {
            let scores = { Roberto: 0, Alessio: 0, Emiliano: 0, Fabio: 0 };
            let potentialLungimiranza = { Roberto: {}, Alessio: {}, Emiliano: {}, Fabio: {} };

            for (let r = 0; r <= state.currentRoundIndex; r++) {
                if (r > 4) break;
                const roundMatches = state.rounds[r].matches;
                const roundPreds = state.predictions[r] || [];

                roundMatches.forEach((match, mIdx) => {
                    if (match.winner && roundPreds[mIdx]) {
                        PLAYERS.forEach(player => {
                            if (roundPreds[mIdx][player] === match.winner) {
                                scores[player] += 3;
                            } else {
                                scores[player] -= 1;
                            }
                        });
                    }
                });
            }

            const finalMatch = state.rounds[4].matches[0];
            const realWinner = finalMatch ? finalMatch.winner : null;

            PLAYERS.forEach(player => {
                let votedTeams = new Set();
                for(let r=0; r<=state.currentRoundIndex; r++) {
                    if(state.favorites[r] && state.favorites[r][player]) {
                        votedTeams.add(state.favorites[r][player]);
                    }
                }

                votedTeams.forEach(team => {
                    let earliestContinuousRound = -1;
                    let targetStartRound = Math.min(state.currentRoundIndex, 4);

                    if (state.favorites[targetStartRound] && state.favorites[targetStartRound][player] === team) {
                        earliestContinuousRound = targetStartRound;
                        for (let r = targetStartRound - 1; r >= 0; r--) {
                            if (state.favorites[r] && state.favorites[r][player] === team) {
                                earliestContinuousRound = r;
                            } else {
                                break;
                            }
                        }
                    }

                    if (earliestContinuousRound !== -1) {
                        potentialLungimiranza[player][team] = LUNGIMIRANZA_BONUS[earliestContinuousRound];
                    } else {
                        potentialLungimiranza[player][team] = 0;
                    }
                });
            });

            return { scores, potentialLungimiranza, realWinner };
        }

        function renderSidebar() {
            const { scores, potentialLungimiranza, realWinner } = calculateScores();
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            // Creiamo un array di oggetti per poter ordinare i giocatori in base ai punti
            let leaderboardData = PLAYERS.map(player => {
                let finalBonus = 0;
                if (realWinner) {
                    finalBonus = potentialLungimiranza[player][realWinner] || 0;
                }
                
                // Il punteggio totale per la classifica è il punteggio puntuale + eventuale bonus definitivo
                let totalScore = scores[player] + finalBonus;

                return {
                    name: player,
                    score: scores[player],
                    finalBonus: finalBonus,
                    totalScore: totalScore,
                    potential: potentialLungimiranza[player]
                };
            });

            // Ordina la classifica in modo decrescente in base al punteggio totale
            leaderboardData.sort((a, b) => b.totalScore - a.totalScore);

            // Genera le righe della tabella seguendo il nuovo ordine
            leaderboardData.forEach(playerData => {
                const tr = document.createElement('tr');
                const player = playerData.name;

                if (realWinner) {
                    tr.innerHTML = `<td><strong>${player}</strong></td><td><strong>${playerData.totalScore}</strong> <small>(${playerData.score} + ${playerData.finalBonus} lung.)</small></td><td>${playerData.finalBonus}</td>`;
                } else {
                    let entries = [];
                    for (let team in playerData.potential) {
                        if (playerData.potential[team] > 0) {
                            entries.push(`${team}: +${playerData.potential[team]}`);
                        }
                    }
                    let lungiText = entries.length > 0 ? entries.join('<br>') : '0';
                    tr.innerHTML = `<td><strong>${player}</strong></td><td><strong>${playerData.score}</strong></td><td><small>${lungiText}</small></td>`;
                }
                tbody.appendChild(tr);
            });

            const favDiv = document.getElementById('current-favorites');
            favDiv.innerHTML = '';
            PLAYERS.forEach(player => {
                const team = (state.favorites[state.currentRoundIndex] && state.favorites[state.currentRoundIndex][player]) ? state.favorites[state.currentRoundIndex][player] : 'Da definire';
                favDiv.innerHTML += `<div><strong>${player}</strong>: ${team}</div>`;
            });

            checkRoundCompletion();
        }

        function setMatchWinner(roundIndex, matchIndex, teamName) {
            // Solo chi ha effettuato il login come admin può modificare cliccando sulle celle
            if (!GITHUB_TOKEN) return; 
            if (roundIndex !== state.currentRoundIndex) return;
            if (!teamName) return;

            const match = state.rounds[roundIndex].matches[matchIndex];
            match.winner = (match.winner === teamName) ? null : teamName;

            propagateTorneo();
            renderBracket();
            renderSidebar();
        }

        function propagateTorneo() {
            for (let r = 0; r < 4; r++) {
                const currentRoundMatches = state.rounds[r].matches;
                const nextRoundMatches = state.rounds[r+1].matches;

                for (let m = 0; m < currentRoundMatches.length; m++) {
                    const targetMatchIndex = Math.floor(m / 2);
                    const isTeam1 = (m % 2 === 0);
                    const winner = currentRoundMatches[m].winner;

                    if (isTeam1) {
                        nextRoundMatches[targetMatchIndex].t1 = winner;
                    } else {
                        nextRoundMatches[targetMatchIndex].t2 = winner;
                    }

                    if (!winner) {
                        nextRoundMatches[targetMatchIndex].winner = null;
                    } else {
                        if (nextRoundMatches[targetMatchIndex].winner !== nextRoundMatches[targetMatchIndex].t1 && 
                            nextRoundMatches[targetMatchIndex].winner !== nextRoundMatches[targetMatchIndex].t2) {
                            nextRoundMatches[targetMatchIndex].winner = null;
                        }
                    }
                }
            }
            const finalMatch = state.rounds[4].matches[0];
            state.rounds[5].winner = finalMatch ? finalMatch.winner : null;
        }

        function checkRoundCompletion() {
            const currentMatches = state.rounds[state.currentRoundIndex].matches;
            const allResolved = currentMatches.every(m => m.winner !== null);
            
            const formDiv = document.getElementById('next-round-form');
            const msgDiv = document.getElementById('round-status-msg');

            if (!GITHUB_TOKEN) {
                msgDiv.innerHTML = "Visualizzazione in sola lettura.";
                formDiv.className = 'hidden';
                return;
            }

            if (allResolved && state.currentRoundIndex < 4) {
                msgDiv.className = 'hidden';
                formDiv.classList.remove('hidden');
                setupNextRoundForm();
            } else {
                formDiv.className = 'hidden';
                msgDiv.classList.remove('hidden');
                if (state.currentRoundIndex === 4 && allResolved) {
                    msgDiv.innerHTML = "<strong>Mondiale Concluso!</strong> Premi il tasto arancione in alto per salvare il verdetto finale.";
                } else {
                    msgDiv.innerHTML = "Scegli tutti i vincitori del turno cliccando sulle squadre nel tabellone, poi compila qui i nuovi pronostici.";
                }
            }
        }

        function setupNextRoundForm() {
            const nextRoundIdx = state.currentRoundIndex + 1;
            const nextMatches = state.rounds[nextRoundIdx].matches;
            const fieldsDiv = document.getElementById('form-fields');
            fieldsDiv.innerHTML = `<h4>Inserisci i Pronostici per: ${ROUND_NAMES[nextRoundIdx]}</h4>`;

            nextMatches.forEach((match, mIdx) => {
                const matchBox = document.createElement('div');
                matchBox.style.marginBottom = '15px';
                matchBox.style.padding = '8px';
                matchBox.style.background = '#fff';
                matchBox.style.borderRadius = '4px';
                matchBox.innerHTML = `<strong>Gara ${mIdx + 1}: ${match.t1} vs ${match.t2}</strong>`;

                PLAYERS.forEach(player => {
                    const group = document.createElement('div');
                    group.className = 'form-group';
                    group.innerHTML = `<label>${player}:</label>
                        <select id="pred_${player}_${mIdx}">
                            <option value="${match.t1}">${match.t1}</option>
                            <option value="${match.t2}">${match.t2}</option>
                        </select>`;
                    matchBox.appendChild(group);
                });
                fieldsDiv.appendChild(matchBox);
            });

            const favBox = document.createElement('div');
            favBox.style.marginTop = '15px';
            favBox.style.padding = '8px';
            favBox.style.background = '#e3f2fd';
            favBox.style.borderRadius = '4px';
            favBox.innerHTML = `<h4>Eleggi Vincitore Mondiale per il nuovo turno</h4>`;

            let activeTeams = [];
            nextMatches.forEach(m => {
                if(m.t1) activeTeams.push(m.t1);
                if(m.t2) activeTeams.push(m.t2);
            });

            PLAYERS.forEach(player => {
                const group = document.createElement('div');
                group.className = 'form-group';
                
                const previousFav = state.favorites[state.currentRoundIndex][player];
                const isStillIn = activeTeams.includes(previousFav);

                let optionsHtml = activeTeams.map(team => {
                    const selected = (isStillIn && team === previousFav) ? 'selected' : '';
                    return `<option value="${team}" ${selected}>${team}</option>`;
                }).join('');

                group.innerHTML = `<label>Favorita Mondiale di ${player}: ${!isStillIn ? '<span style="color:red">(Eliminata)</span>' : ''}</label>
                    <select id="fav_${player}">
                        ${optionsHtml}
                    </select>`;
                favBox.appendChild(group);
            });
            fieldsDiv.appendChild(favBox);
        }

        function saveNextRoundPredictions() {
            const nextRoundIdx = state.currentRoundIndex + 1;
            const nextMatches = state.rounds[nextRoundIdx].matches;

            state.predictions[nextRoundIdx] = [];
            state.favorites[nextRoundIdx] = {};

            nextMatches.forEach((match, mIdx) => {
                let matchPred = {};
                PLAYERS.forEach(player => {
                    const selectEl = document.getElementById(`pred_${player}_${mIdx}`);
                    matchPred[player] = selectEl.value;
                });
                state.predictions[nextRoundIdx].push(matchPred);
            });

            PLAYERS.forEach(player => {
                const selectFav = document.getElementById(`fav_${player}`);
                state.favorites[nextRoundIdx][player] = selectFav.value;
            });

            state.currentRoundIndex = nextRoundIdx;
            
            renderBracket();
            renderSidebar();
            alert("Turno avanzato localmente. Ricordati di cliccare sul tasto arancione 'Salva modifiche su GitHub' in alto per pubblicarlo a tutti!");
        }

        function renderBracket() {
            const bracketContainer = document.getElementById('bracket');
            bracketContainer.innerHTML = '';

            for (let r = 0; r < 5; r++) {
                const roundData = state.rounds[r];
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';

                const title = document.createElement('div');
                title.className = 'round-title';
                title.innerText = `${roundData.name} ${state.currentRoundIndex === r ? '(Corrente)' : ''}`;
                roundDiv.appendChild(title);

                roundData.matches.forEach((match, mIdx) => {
                    const matchupDiv = document.createElement('div');
                    matchupDiv.className = 'matchup';

                    const team1Name = match.t1 || 'Da determinare';
                    const team2Name = match.t2 || 'Da determinare';

                    let t1Class = 'team-row';
                    let t2Class = 'team-row';

                    if (match.winner) {
                        if (match.winner === match.t1) { t1Class += ' winner'; t2Class += ' eliminated'; }
                        if (match.winner === match.t2) { t2Class += ' winner'; t1Class += ' eliminated'; }
                    }

                    const t1Row = document.createElement('div');
                    t1Row.className = t1Class;
                    t1Row.innerText = team1Name;
                    t1Row.onclick = () => setMatchWinner(r, mIdx, match.t1);

                    const t2Row = document.createElement('div');
                    t2Row.className = t2Class;
                    t2Row.innerText = team2Name;
                    t2Row.onclick = () => setMatchWinner(r, mIdx, match.t2);

                    matchupDiv.appendChild(t1Row);
                    matchupDiv.appendChild(t2Row);

                    if (state.predictions[r] && state.predictions[r][mIdx]) {
                        const predIndicator = document.createElement('div');
                        predIndicator.className = 'predictions-indicator';
                        
                        let predStrings = [];
                        PLAYERS.forEach(player => {
                            const pPred = state.predictions[r][mIdx][player];
                            if(pPred) {
                                let color = 'inherit';
                                if (match.winner) {
                                    color = (pPred === match.winner) ? 'var(--success-color)' : 'var(--danger-color)';
                                }
                                predStrings.push(`<span style="color: ${color}"><strong>${player[0]}</strong>:${pPred}</span>`);
                            }
                        });
                        predIndicator.innerHTML = predStrings.join(' | ');
                        matchupDiv.appendChild(predIndicator);
                    }

                    roundDiv.appendChild(matchupDiv);
                });

                bracketContainer.appendChild(roundDiv);
            }
        }

        window.onload = function() {
            fetchStateFromGitHub();
        };
    </script>
</body>
</html>
